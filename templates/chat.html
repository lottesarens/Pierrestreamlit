<!DOCTYPE html>
<html>

<head>
    <title>Medische chatbot uz</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css"
        integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.5.0/css/all.css"
        integrity="sha384-B4dIYHKNBt8Bc12p+WXckhzcICo0wtJAoU8YZTY5qE0Id1GSseTk6S+L3BlXeVIU" crossorigin="anonymous">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css')}}" />

    <style>
        /* Styling voor Suggestie Knoppen */
        .suggest-btn {
            margin: 5px;
            border-radius: 20px;
            border: 1px solid #f188d6;
            color: #f188d6;
            background: white;
            font-size: 0.85rem;
            transition: 0.3s;
        }
        .suggest-btn:hover {
            background-color: #f188d6;
            color: white;
        }

        /* Styling voor Typing Indicator */
        .typing {
            font-style: italic;
            font-size: 14px;
            color: #555;
        }
        .dot {
            display: inline-block;
            width: 4px;
            height: 4px;
            margin-left: 2px;
            background: #555;
            border-radius: 50%;
            animation: blink 1.4s infinite both;
        }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink {
            0% { opacity: 0.2; }
            20% { opacity: 1; }
            100% { opacity: 0.2; }
        }
    </style>
</head>

<body>
    <div class="container-fluid h-100">
        <div class="row justify-content-center h-100">
            <div class="col-md-8 col-xl-6 chat">
                <div class="card">
                    <div class="card-header msg_head">
                        <div class="d-flex bd-highlight">
                            <div class="img_cont">
                                <img src="{{ url_for('static', filename='Pierre.png') }}" alt="Pierre avatar" width="75"
                                    class="mb-4 rounded-circle">
                                <span class="online_icon"></span>
                            </div>
                            <div class="user_info">
                                <span>Pierre</span>
                                <p>Waarmee kan ik u helpen?</p>
                            </div>
                        </div>
                    </div>

                    <div id="messageFormeight" class="card-body msg_card_body">
                        </div>

                    <div class="card-footer">
                        <form id="messageArea" class="input-group">
                            <input type="text" id="text" name="msg" placeholder="Stel uw vraag..." autocomplete="off"
                                class="form-control type_msg" required />
                            <div class="input-group-append">
                                <button type="submit" id="send" class="input-group-text send_btn"><i
                                        class="fas fa-location-arrow"></i></button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>




    <script>
        $(document).ready(function () {
        // Logica voor suggestie knoppen
            $(document).on("click", ".suggest-btn", function() {
                var text = $(this).data("question");
                $("#text").val(text);
                $("#messageArea").submit();
            });

        $("#messageArea").on("submit", async function (event) {
            event.preventDefault();
            const date = new Date();
            const str_time = date.getHours() + ":" + date.getMinutes().toString().padStart(2, '0');
            var rawText = $("#text").val();
            if (rawText == "") return;

            // Gebruiker bericht toevoegen
            var userHtml = '<div class="d-flex justify-content-end mb-4"><div class="msg_cotainer_send">' + rawText + '<span class="msg_time_send">' + str_time + '</span></div><div class="img_cont_msg"><img src="https://i.ibb.co/d5b84Xw/Untitled-design.png" class="rounded-circle user_img_msg"></div></div>';
            $("#text").val("");
            $("#messageFormeight").append(userHtml);
            $("#messageFormeight").scrollTop($("#messageFormeight")[0].scrollHeight);

            // 1. Typing Indicator toevoegen
            var typingHtml = '<div id="typing-indicator" class="d-flex justify-content-start mb-4"><div class="img_cont_msg"><img src="/static/Pierre.png" class="rounded-circle user_img_msg"></div><div class="msg_cotainer typing"> <span class="dot"></span><span class="dot"></span><span class="dot"></span></div></div>';
            $("#messageFormeight").append(typingHtml);
            $("#messageFormeight").scrollTop($("#messageFormeight")[0].scrollHeight);

            // 2. Container voor Pierre's antwoord voorbereiden
            var botMessageId = "bot_" + Date.now();
            // We maken een aparte div voor de tekst (id + _text) zodat de tijdstempel niet overschreven wordt
            var botHtml = '<div class="d-flex justify-content-start mb-4"><div class="img_cont_msg"><img src="/static/Pierre.png" class="rounded-circle user_img_msg"></div><div class="msg_cotainer"><div id="' + botMessageId + '"></div><span class="msg_time">' + str_time + '</span></div></div>';
            
            try {
                const response = await fetch("/get", {
                    method: "POST",
                    headers: { "Content-Type": "application/x-www-form-urlencoded" },
                    body: "msg=" + encodeURIComponent(rawText)
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                
                $("#typing-indicator").remove();
                $("#messageFormeight").append(botHtml);
                let botTextElement = document.getElementById(botMessageId);
                let accumulatedText = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    accumulatedText += decoder.decode(value, { stream: true });
                    
                    // Formatteer de tekst live tijdens het streamen
                    let formattedText = accumulatedText
                        .replace(/\n/g, "<br>")                          // Enters naar HTML breaks
                        .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>"); // Markdown bold naar HTML bold
                    
                    botTextElement.innerHTML = formattedText;

                    // Scroll automatisch mee naar beneden
                    $("#messageFormeight").scrollTop($("#messageFormeight")[0].scrollHeight);
                }

            } catch (error) {
                console.error("Streaming error:", error);
                $("#typing-indicator").remove();
                $("#messageFormeight").append('<div class="d-flex justify-content-start mb-4"><div class="msg_cotainer">Sorry, Pierre heeft een verbindingsfout.</div></div>');
            }
        });
    });
</script>




</body>
</html>
